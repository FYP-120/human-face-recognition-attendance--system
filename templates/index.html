<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face Recognition Attendance System</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .container {
        background: white;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 800px;
        width: 100%;
      }
      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 30px;
      }
      .video-container {
        position: relative;
        width: 100%;
        max-width: 640px;
        margin: 0 auto 20px;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }
      #video {
        width: 100%;
        height: auto;
        display: block;
      }
      #canvas {
        display: none;
      }
      .controls {
        display: flex;
        gap: 15px;
        justify-content: center;
        margin-bottom: 20px;
      }
      button {
        padding: 12px 30px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s;
        font-weight: 600;
      }
      .btn-start {
        background: #4caf50;
        color: white;
      }
      .btn-start:hover {
        background: #45a049;
      }
      .btn-capture {
        background: #2196f3;
        color: white;
      }
      .btn-capture:hover {
        background: #0b7dda;
      }
      .btn-stop {
        background: #f44336;
        color: white;
      }
      .btn-stop:hover {
        background: #da190b;
      }
      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      #status {
        text-align: center;
        padding: 15px;
        border-radius: 8px;
        margin-top: 15px;
        font-weight: 500;
      }
      .status-info {
        background: #e3f2fd;
        color: #1976d2;
      }
      .status-success {
        background: #e8f5e9;
        color: #2e7d32;
      }
      .status-error {
        background: #ffebee;
        color: #c62828;
      }
      .status-warning {
        background: #fff3e0;
        color: #ef6c00;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📸 Face Recognition Attendance System</h1>

      <div class="video-container">
        <video id="video" autoplay></video>
        <canvas id="canvas"></canvas>
      </div>

      <div class="controls">
        <button id="startBtn" class="btn-start" onclick="startCamera()">
          Start Camera
        </button>
        <button
          id="captureBtn"
          class="btn-capture"
          onclick="captureAndMark()"
          disabled
        >
          Mark Attendance
        </button>
        <button id="stopBtn" class="btn-stop" onclick="stopCamera()" disabled>
          Stop Camera
        </button>
      </div>

      <div id="status" class="status-info">Click "Start Camera" to begin</div>
    </div>

    <script>
      let video = document.getElementById("video");
      let canvas = document.getElementById("canvas");
      let ctx = canvas.getContext("2d");
      let stream = null;

      async function startCamera() {
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { width: 640, height: 480 },
          });
          video.srcObject = stream;

          document.getElementById("startBtn").disabled = true;
          document.getElementById("captureBtn").disabled = false;
          document.getElementById("stopBtn").disabled = false;

          updateStatus(
            'Camera started. Position your face and click "Mark Attendance"',
            "info"
          );
        } catch (err) {
          updateStatus("Error accessing camera: " + err.message, "error");
          console.error("Error:", err);
        }
      }

      function stopCamera() {
        if (stream) {
          stream.getTracks().forEach((track) => track.stop());
          video.srcObject = null;

          document.getElementById("startBtn").disabled = false;
          document.getElementById("captureBtn").disabled = true;
          document.getElementById("stopBtn").disabled = true;

          updateStatus("Camera stopped", "info");
        }
      }

      async function captureAndMark() {
        // Disable button during processing
        const captureBtn = document.getElementById("captureBtn");
        captureBtn.disabled = true;

        // Set canvas size to match video
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        // Draw video frame to canvas
        ctx.drawImage(video, 0, 0);

        // Convert canvas to blob
        canvas.toBlob(
          async (blob) => {
            try {
              updateStatus(
                "🔄 Processing face recognition... Please wait",
                "warning"
              );

              // Create form data
              const formData = new FormData();
              formData.append("file", blob, "capture.jpg");

              // Send to backend API with timeout
              const controller = new AbortController();
              const timeoutId = setTimeout(() => controller.abort(), 15000); // 15 second timeout

              const response = await fetch(
                "http://127.0.0.1:8000/attendance/mark-from-image",
                {
                  method: "POST",
                  body: formData,
                  signal: controller.signal,
                }
              );

              clearTimeout(timeoutId);

              const result = await response.json();

              if (response.ok) {
                let msg = result.message || "Attendance marked successfully!";
                if (result.warning) {
                  msg += " ⚠️ " + result.warning;
                }
                updateStatus("✅ " + msg, "success");
              } else {
                updateStatus(
                  "❌ " + (result.detail || "Failed to mark attendance"),
                  "error"
                );
              }
            } catch (err) {
              if (err.name === "AbortError") {
                updateStatus(
                  "⏱️ Timeout: Processing took too long. Try again with better lighting.",
                  "error"
                );
              } else {
                updateStatus("❌ Error: " + err.message, "error");
              }
              console.error("Error:", err);
            } finally {
              // Re-enable button
              captureBtn.disabled = false;
            }
          },
          "image/jpeg",
          0.8
        ); // Reduce quality to 80% for faster upload
      }

      function updateStatus(message, type) {
        const statusDiv = document.getElementById("status");
        statusDiv.textContent = message;
        statusDiv.className = "status-" + type;
      }

      // Cleanup on page unload
      window.addEventListener("beforeunload", () => {
        stopCamera();
      });
    </script>
  </body>
</html>
